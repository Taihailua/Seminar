<!DOCTYPE html>
<html class="dark" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Neon Gastronome Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#1e1e2f",
              "primary-fixed": "#0284c7",
              "on-secondary-container": "#fff6f2",
              tertiary: "#ffc968",
              "on-primary": "#521f00",
              error: "#ff7351",
              "on-tertiary-container": "#543a00",
              "secondary-fixed": "#ffc69d",
              "on-background": "#e9e6f9",
              "on-secondary": "#4c2400",
              "secondary-dim": "#ed862b",
              "secondary-fixed-dim": "#ffb37a",
              surface: "#0d0d1a",
              "error-dim": "#d53d18",
              "on-surface": "#e9e6f9",
              "on-error": "#450900",
              "inverse-surface": "#fcf8ff",
              "on-tertiary": "#5f4200",
              "outline-variant": "#474656",
              "tertiary-fixed-dim": "#ecaa12",
              "tertiary-dim": "#ecaa12",
              secondary: "#38bdf8",
              "primary-fixed-dim": "#f16b0b",
              "tertiary-container": "#fcb825",
              "error-container": "#b92902",
              "on-tertiary-fixed": "#3a2600",
              "surface-variant": "#242437",
              "inverse-on-surface": "#545363",
              "on-tertiary-fixed-variant": "#5f4200",
              "on-primary-fixed-variant": "#4e1d00",
              "inverse-primary": "#9f4300",
              background: "#0d0d1a",
              "primary-dim": "#0284c7",
              primary: "#0ea5e9",
              "surface-container": "#181828",
              "on-primary-container": "#3f1600",
              "surface-tint": "#0ea5e9",
              "surface-container-low": "#121220",
              "on-error-container": "#ffd2c8",
              "on-secondary-fixed": "#542900",
              "primary-container": "#0284c7",
              "on-secondary-fixed-variant": "#7e4000",
              "surface-bright": "#2a2a3f",
              "secondary-container": "#934b00",
              "on-primary-fixed": "#000000",
              "tertiary-fixed": "#fcb825",
              "surface-container-lowest": "#000000",
              "surface-dim": "#0d0d1a",
              outline: "#757485",
              "on-surface-variant": "#aba9bb",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans"],
              body: ["Plus Jakarta Sans"],
              label: ["Plus Jakarta Sans"],
            },
          },
        },
      };
    </script>
    <style>
      body { font-family: "Plus Jakarta Sans", sans-serif; }
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
      .glass-card {
        background: rgba(36, 36, 55, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .orange-glow { text-shadow: 0 0 10px rgba(14, 165, 233, 0.4); }
      .primary-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="bg-surface text-on-surface min-h-[100dvh] pb-10">

    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-[#181828]/70 backdrop-blur-xl flex justify-between items-center px-4 sm:px-6 h-14 sm:h-16 shadow-2xl">
      <div class="flex items-center gap-2 sm:gap-3 min-w-0">
        <span class="material-symbols-outlined text-[#0ea5e9] text-[20px] sm:text-[24px] flex-shrink-0 notranslate">admin_panel_settings</span>
        <h1 class="font-bold tracking-tight text-sm sm:text-lg text-[#0ea5e9] drop-shadow-[0_0_8px_rgba(14,165,233,0.4)] truncate">
          NEON GASTRONOME ADMIN
        </h1>
      </div>
      <button id="btn-logout" class="flex items-center gap-1 sm:gap-1.5 text-on-surface-variant hover:text-[#f87171] transition-colors active:scale-95 text-xs sm:text-sm font-semibold flex-shrink-0 ml-2">
        <span class="material-symbols-outlined text-[18px] sm:text-[20px] notranslate">logout</span>
        <span class="hidden xs:inline">Đăng xuất</span>
      </button>
    </header>

    <main class="pt-16 sm:pt-20 px-4 sm:px-6 space-y-6 sm:space-y-8 max-w-2xl mx-auto">

      <!-- Welcome + Admin Profile Card -->
      <section class="mt-3 sm:mt-4 space-y-3 sm:space-y-4">
        <div class="flex items-center gap-2 flex-wrap">
          <h2 class="text-xl sm:text-2xl font-extrabold tracking-tight">⚙️ Admin Dashboard</h2>
          <span class="bg-error-container text-on-error-container text-[9px] sm:text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-widest">ADMIN</span>
        </div>

        <!-- Profile Card — populated by admin.js → populateProfile() -->
        <div class="glass-card rounded-2xl p-3 sm:p-4 flex items-center gap-3 sm:gap-4">
          <div id="admin-initial" class="w-12 h-12 sm:w-[52px] sm:h-[52px] rounded-full flex-shrink-0 primary-gradient flex items-center justify-center font-extrabold text-lg sm:text-[20px] text-[#521f00]">?</div>
          <div class="flex-1 min-w-0">
            <div id="admin-name" class="font-bold text-on-surface text-sm sm:text-base truncate">Đang tải...</div>
            <div id="admin-email" class="text-on-surface-variant text-xs truncate mt-0.5">Đang tải...</div>
            <div id="admin-joined" class="text-on-surface-variant text-[10px] sm:text-[11px] mt-1">Đang tải...</div>
          </div>
          <span class="bg-error-container text-on-error-container text-[9px] sm:text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-widest flex-shrink-0">Admin</span>
        </div>
      </section>

      <!-- Global Stats Section -->
      <section>
        <div class="grid grid-cols-2 gap-3 sm:gap-4">
          <!-- QR Scans — large bento card -->
          <div class="col-span-2 glass-card p-4 sm:p-5 rounded-2xl shadow-lg flex justify-between items-center overflow-hidden relative">
            <div class="absolute -right-4 -top-4 w-20 sm:w-24 h-20 sm:h-24 bg-primary/10 rounded-full blur-2xl"></div>
            <div>
              <p class="text-on-surface-variant text-[10px] sm:text-xs font-bold uppercase tracking-widest mb-1">📷 Tổng quét QR</p>
              <h3 class="stat-scans text-3xl sm:text-4xl font-extrabold text-primary-fixed tracking-tighter">0</h3>
            </div>
            <span class="material-symbols-outlined text-primary/30 text-4xl sm:text-5xl notranslate">qr_code_2</span>
          </div>

          <div class="glass-card p-3 sm:p-4 rounded-2xl shadow-md border-l-4 border-primary/20">
            <p class="text-on-surface-variant text-[9px] sm:text-[10px] font-bold uppercase tracking-widest mb-1.5 sm:mb-2">👥 Người dùng</p>
            <h3 class="stat-users text-xl sm:text-2xl font-bold text-primary">0</h3>
          </div>

          <div class="glass-card p-3 sm:p-4 rounded-2xl shadow-md border-l-4 border-primary/20 bg-primary/5">
            <div class="flex items-center gap-2 mb-1.5 sm:mb-2">
              <p class="text-on-surface-variant text-[9px] sm:text-[10px] font-bold uppercase tracking-widest">🟢 Thiết bị online</p>
              <span class="flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-green-500 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
              </span>
            </div>
            <h3 class="stat-active-devices text-xl sm:text-2xl font-bold text-green-400">0</h3>
          </div>

          <div class="glass-card p-3 sm:p-4 rounded-2xl shadow-md border-l-4 border-primary/20">
            <p class="text-on-surface-variant text-[9px] sm:text-[10px] font-bold uppercase tracking-widest mb-1.5 sm:mb-2">🏪 Nhà hàng</p>
            <h3 class="stat-restaurants text-xl sm:text-2xl font-bold text-primary">0</h3>
          </div>

          <div class="glass-card p-3 sm:p-4 rounded-2xl shadow-md relative overflow-hidden bg-primary/5">
            <div class="flex items-center gap-2 mb-1.5 sm:mb-2">
              <p class="text-on-surface-variant text-[9px] sm:text-[10px] font-bold uppercase tracking-widest">⏳ Chờ duyệt</p>
              <span class="flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-primary opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
              </span>
            </div>
            <h3 class="stat-pending text-xl sm:text-2xl font-bold text-primary">0</h3>
          </div>

          <div class="glass-card p-3 sm:p-4 rounded-2xl shadow-md">
            <p class="text-on-surface-variant text-[9px] sm:text-[10px] font-bold uppercase tracking-widest mb-1.5 sm:mb-2">⭐ Đánh giá</p>
            <h3 class="stat-reviews text-xl sm:text-2xl font-bold text-primary">0</h3>
          </div>
        </div>
      </section>

      <!-- Pending Approval Section -->
      <section class="space-y-3 sm:space-y-4">
        <div class="flex justify-between items-end px-1">
          <h3 class="text-lg sm:text-xl font-bold tracking-tight">⏳ Nhà Hàng Chờ Duyệt (<span class="pending-count">0</span>)</h3>
        </div>
        <!-- Populated by admin.js → renderPendingRestaurants() -->
        <div id="pending-list" class="space-y-3 sm:space-y-4"></div>
      </section>

      <!-- User Management Section -->
      <section class="space-y-3 sm:space-y-4">
        <h3 class="text-lg sm:text-xl font-bold tracking-tight px-1 flex items-center gap-2">
          <span class="material-symbols-outlined notranslate">group</span> Quản Lý Người Dùng
        </h3>
        <div class="glass-card p-2 rounded-2xl flex items-center px-4 gap-3 bg-surface-container-high/50">
          <span class="material-symbols-outlined text-on-surface-variant notranslate">search</span>
          <input
            id="user-search"
            class="bg-transparent border-none focus:ring-0 text-sm w-full py-2 placeholder-on-surface-variant/50"
            placeholder="Tìm kiếm người dùng..."
            type="text"
          />
        </div>
        <!-- Populated by admin.js → renderUsersTable() -->
        <div id="users-list" class="users-table space-y-2 sm:space-y-3"></div>
      </section>

    </main>

    <script type="module" src="../js/admin.js"></script>
    <script src="../js/translator.js"></script>
  </body>
</html>
