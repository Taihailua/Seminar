<body class="bg-background text-on-surface font-body overflow-x-hidden min-h-screen flex flex-col items-center justify-start">
<!-- Hero Background Section (The Street Mood) -->
<div class="fixed inset-0 z-0 opacity-40 bg-street-pattern" data-alt="cinematic long shot of a bustling saigon night market street with vibrant neon signs reflecting on wet pavement and warm food stall lights"></div>
<!-- App Header -->
<header class="relative z-10 w-full pt-12 pb-8 flex flex-col items-center justify-center">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center glow-orange mb-4 shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-on-primary-container text-4xl notranslate" data-icon="ramen_dining">ramen_dining</span>
</div>
<h1 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface">
            Phố Vĩnh Khánh
        </h1>
<p class="text-primary font-medium tracking-[0.2em] text-xs mt-1">AUDIO GUIDE</p>
</header>
<!-- Language Selector -->
<div class="relative z-10 flex gap-4 mb-6">
    <button onclick="changeLanguage('vi')" class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/10 hover:border-primary transition-all active:scale-95" title="Tiếng Việt">
        <img src="https://flagcdn.com/vn.svg" class="w-full h-full object-cover">
    </button>
    <button onclick="changeLanguage('en')" class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/10 hover:border-primary transition-all active:scale-95" title="English">
        <img src="https://flagcdn.com/us.svg" class="w-full h-full object-cover">
    </button>
    <button onclick="changeLanguage('ko')" class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/10 hover:border-primary transition-all active:scale-95" title="한국어">
        <img src="https://flagcdn.com/kr.svg" class="w-full h-full object-cover">
    </button>
    <button onclick="changeLanguage('zh-CN')" class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/10 hover:border-primary transition-all active:scale-95" title="中文">
        <img src="https://flagcdn.com/cn.svg" class="w-full h-full object-cover">
    </button>
</div>

<!-- Main Auth Canvas -->
<main class="relative z-10 w-full px-6 mb-12 max-w-md">
<div class="glass-card rounded-[24px] overflow-hidden shadow-2xl border border-white/5">
<!-- Tabs -->
<div class="flex border-b border-white/5">
<button class="flex-1 py-5 text-sm font-bold text-primary relative">
                    Đăng Nhập
                    <div class="absolute bottom-0 left-0 w-full h-[3px] bg-primary rounded-t-full shadow-[0_0_8px_rgba(14,165,233,0.8)]"></div>
</button>
<button class="flex-1 py-5 text-sm font-bold text-on-surface/50 hover:text-on-surface transition-colors">
                    Đăng Ký
                </button>
</div>
<!-- Content Area (Login View) -->
<form id="login-form" onsubmit="return false;" class="p-8 space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface/60 ml-1">Tên đăng nhập</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface/40 group-focus-within:text-primary transition-colors notranslate" data-icon="person">person</span>
</div>
<input id="login-username" class="w-full bg-surface-container-high/60 border-none rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-on-surface/20 focus:ring-1 focus:ring-primary/40 transition-all" placeholder="Tên đăng nhập" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-semibold text-on-surface/60">Mật khẩu</label>
<a class="text-xs font-bold text-primary hover:opacity-80 transition-opacity" href="#" onclick="alert('Tính năng khôi phục mật khẩu đang phát triển!'); return false;">Quên mật khẩu?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface/40 group-focus-within:text-primary transition-colors notranslate" data-icon="lock">lock</span>
</div>
<input id="login-password" class="w-full bg-surface-container-high/60 border-none rounded-xl py-3.5 pl-12 pr-12 text-on-surface placeholder:text-on-surface/20 focus:ring-1 focus:ring-primary/40 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface/40 hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm notranslate" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button id="login-submit-btn" class="w-full h-14 bg-gradient-to-r from-primary-dim to-primary rounded-xl flex items-center justify-center space-x-3 shadow-[0_8px_24px_rgba(14,165,233,0.3)] active:scale-95 transition-transform">
<span class="text-on-primary font-extrabold tracking-wide">ĐĂNG NHẬP</span>
<span class="material-symbols-outlined text-on-primary notranslate" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Login Separator -->
<div class="flex items-center space-x-4 pt-4">
<div class="flex-1 h-[1px] bg-white/5"></div>
<span class="text-[10px] font-bold text-on-surface/30 tracking-widest">ĐĂNG NHẬP NHANH (TEST)</span>
<div class="flex-1 h-[1px] bg-white/5"></div>
</div>
<!-- Quick Login Buttons for Testing -->
<div class="flex gap-2 mt-4">
<button class="flex-1 h-12 rounded-xl bg-surface-container-highest/40 flex items-center justify-center border border-white/5 hover:bg-surface-container-highest/60 transition-colors" onclick="fillAndLogin('user', 'user123')">
<span class="text-xs font-bold text-primary">Khách</span>
</button>
<button class="flex-1 h-12 rounded-xl bg-surface-container-highest/40 flex items-center justify-center border border-white/5 hover:bg-surface-container-highest/60 transition-colors" onclick="fillAndLogin('owner', 'owner123')">
<span class="text-xs font-bold text-primary">Chủ quán</span>
</button>
<button class="flex-1 h-12 rounded-xl bg-surface-container-highest/40 flex items-center justify-center border border-white/5 hover:bg-surface-container-highest/60 transition-colors" onclick="fillAndLogin('admin', 'admin123')">
<span class="text-xs font-bold text-primary">Admin</span>
</button>
</div>
</div>
</div>
<!-- Hidden Template Structure for Register (As requested, secondary tab content) -->
<div id="register-panel" style="display:none;" class="p-8 space-y-4">
<form id="register-form" onsubmit="return false;">
<input id="reg-username" class="w-full bg-surface-container-high/60 border-none rounded-xl py-3.5 px-4 text-on-surface mb-3" placeholder="Tên tài khoản *" type="text"/>
<input id="reg-email" class="w-full bg-surface-container-high/60 border-none rounded-xl py-3.5 px-4 text-on-surface mb-3" placeholder="Email *" type="email"/>
<input id="reg-password" class="w-full bg-surface-container-high/60 border-none rounded-xl py-3.5 px-4 text-on-surface mb-4" placeholder="Mật khẩu *" type="password"/>
<div class="flex p-1 bg-surface-container-lowest rounded-xl mb-4">
<button type="button" data-role="user" class="role-pill active flex-1 py-2 text-xs font-bold rounded-lg bg-primary-container text-on-primary-container transition-all">Khách hàng</button>
<button type="button" data-role="owner" class="role-pill flex-1 py-2 text-xs font-bold rounded-lg text-on-surface/40 transition-all">Chủ quán</button>
</div>
<button type="submit" class="w-full h-14 bg-gradient-to-r from-primary-dim to-primary rounded-xl text-on-primary font-extrabold tracking-wide shadow-lg">TẠO TÀI KHOẢN</button>
</form>
</div>
<!-- Footer Help -->
<p class="text-center mt-12 text-on-surface/40 text-xs">
            Bằng cách đăng nhập, bạn đồng ý với <br/>
<a class="text-on-surface/60 underline decoration-primary/30 underline-offset-4" href="#" onclick="alert('Nội dung Điều khoản đang được cập nhật.'); return false;">Điều khoản dịch vụ</a> và <a class="text-on-surface/60 underline decoration-primary/30 underline-offset-4" href="#" onclick="alert('Nội dung Chính sách đang được cập nhật.'); return false;">Chính sách bảo mật</a>
</p>
</main>
<!-- Visual Anchor / Bottom Element -->
<div class="mt-auto w-full max-w-md px-6 pb-8 relative z-10 overflow-hidden">
<div class="flex items-end justify-between opacity-20 grayscale brightness-150">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl mb-[-4px] notranslate" data-icon="storefront">storefront</span>
<div class="w-12 h-1 bg-on-surface/20 rounded-full"></div>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-5xl mb-[-4px] notranslate" data-icon="local_dining">local_dining</span>
<div class="w-16 h-1 bg-on-surface/20 rounded-full"></div>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl mb-[-4px] notranslate" data-icon="festival">festival</span>
<div class="w-10 h-1 bg-on-surface/20 rounded-full"></div>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-6xl mb-[-4px] notranslate" data-icon="directions_bike">directions_bike</span>
<div class="w-20 h-1 bg-on-surface/20 rounded-full"></div>
</div>
</div>
</div>
<script type="module" src="../js/auth.js"></script>
<script>
// Tab switching for login/register
document.addEventListener('DOMContentLoaded', function() {
  const tabBtns = document.querySelectorAll('[class*="flex-1 py-5"]');
  const loginContent = document.querySelector('.p-8.space-y-6');
  const registerPanel = document.getElementById('register-panel');
  if (tabBtns.length >= 2) {
    tabBtns[0].addEventListener('click', function() {
      if(loginContent) loginContent.style.display = '';
      if(registerPanel) registerPanel.style.display = 'none';
      tabBtns[0].classList.add('text-primary'); tabBtns[1].classList.remove('text-primary');
    });
    tabBtns[1].addEventListener('click', function() {
      if(loginContent) loginContent.style.display = 'none';
      if(registerPanel) registerPanel.style.display = 'block';
      tabBtns[1].classList.add('text-primary'); tabBtns[0].classList.remove('text-primary');
    });
  }
  // Role pill toggle
  document.querySelectorAll('.role-pill').forEach(function(p){
    p.addEventListener('click',function(){
      document.querySelectorAll('.role-pill').forEach(function(x){
        x.classList.remove('active','bg-primary-container','text-on-primary-container');
        x.classList.add('text-on-surface/40');
      });
      p.classList.add('active','bg-primary-container','text-on-primary-container');
      p.classList.remove('text-on-surface/40');
    });
  });
});
</script>
<script src="../js/translator.js"></script>
</body></html>
