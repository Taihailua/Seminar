<!DOCTYPE html>
<html class="dark" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Phố Vĩnh Khánh — Bản Đồ</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-surface": "#fcf8ff",
              "primary-fixed": "#0284c7",
              "tertiary-fixed": "#fcb825",
              "on-secondary-container": "#fff6f2",
              "surface-tint": "#0ea5e9",
              "surface-container-high": "#1e1e2f",
              "surface-container-lowest": "#000000",
              "surface-dim": "#0d0d1a",
              secondary: "#38bdf8",
              primary: "#0ea5e9",
              tertiary: "#ffc968",
              surface: "#0d0d1a",
              "on-surface": "#e9e6f9",
              "surface-variant": "#242437",
              outline: "#757485",
              "surface-container-highest": "#242437",
              "surface-container": "#181828",
              error: "#ff7351",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans"],
              body: ["Plus Jakarta Sans"],
              label: ["Plus Jakarta Sans"],
            },
          },
        },
      };
    </script>
    <style>
      body { font-family: "Plus Jakarta Sans", sans-serif; }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .user-location-pulse {
        width: 14px; height: 14px;
        background: #0ea5e9;
        border: 3px solid white;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(14, 165, 233, 0.8);
        position: relative;
      }
      .user-location-pulse::after {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        border: 2px solid #0ea5e9;
        animation: user-pulse 2s ease-out infinite;
      }
      @keyframes user-pulse {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(3); opacity: 0; }
      }
    </style>
  </head>
  <body class="bg-surface-dim text-on-surface font-body selection:bg-primary/30 overflow-hidden">

    <!-- Drawer Overlay -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 z-[60] backdrop-blur-sm hidden"></div>

    <!-- Side Drawer -->
    <div id="side-menu" class="fixed top-0 left-0 h-full w-64 sm:w-72 bg-[#181828] z-[70] transform -translate-x-full transition-transform duration-300 shadow-2xl border-r border-[#242437]/30">
      <div class="p-5 sm:p-6 flex flex-col h-full gap-6">
        <!-- User Info -->
        <div class="flex items-center gap-3 sm:gap-4">
          <div class="w-11 h-11 sm:w-12 sm:h-12 rounded-full bg-primary/20 flex items-center justify-center font-bold text-primary avatar flex-shrink-0">?</div>
          <div class="min-w-0">
            <p class="font-bold text-on-surface text-sm truncate user-name">Đang tải...</p>
            <p class="text-[10px] text-primary uppercase tracking-wide nav-role">Khách hàng</p>
          </div>
        </div>
        <div class="h-px bg-white/10 w-full"></div>
        <nav class="flex flex-col gap-3 sm:gap-4">
          <a href="map.html" class="flex items-center gap-3 font-bold text-primary text-sm p-3 bg-primary/10 rounded-xl">
            <span class="material-symbols-outlined">map</span> Bản đồ
          </a>
        </nav>
        <div class="mt-auto">
          <button id="btn-logout" class="w-full h-12 rounded-xl bg-error/10 text-error font-bold flex items-center justify-center gap-2 active:bg-error/20 transition-colors">
            <span class="material-symbols-outlined text-sm">logout</span> Đăng xuất
          </button>
        </div>
      </div>
    </div>

    <!-- Map Container -->
    <div id="map-container" class="fixed inset-0 z-0 bg-black" style="height:100dvh;width:100vw;"></div>

    <!-- Top App Bar -->
    <header class="fixed top-0 w-full z-50 bg-[#181828]/70 backdrop-blur-xl flex justify-between items-center px-3 sm:px-4 h-14 sm:h-16 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
      <button id="menu-toggle" class="p-2 hover:bg-[#242437]/50 rounded-full transition-all text-primary">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <h1 class="font-headline font-bold tracking-tight text-base sm:text-lg text-on-surface">Phố Vĩnh Khánh 📍</h1>
      <div class="flex items-center gap-2 sm:gap-3">
        <button id="qr-scan-btn" class="text-primary drop-shadow-[0_0_8px_rgba(14,165,233,0.4)] hover:scale-110 transition-transform p-1">
          <span class="material-symbols-outlined">qr_code_scanner</span>
        </button>
        <a href="profile.html" class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant flex items-center justify-center overflow-hidden hover:border-primary/50 transition-colors">
          <span class="user-avatar text-[10px] font-bold text-secondary">VT</span>
        </a>
      </div>
    </header>

    <!-- Top Map Controls -->
    <div class="fixed top-16 sm:top-20 left-1/2 -translate-x-1/2 z-40 flex bg-surface-container/60 backdrop-blur-xl rounded-2xl p-1 sm:p-1.5 border border-white/5 shadow-2xl">
      <button id="btn-center-user" class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 sm:gap-2 hover:bg-white/5 transition-all whitespace-nowrap">
        <span class="material-symbols-outlined text-sm">my_location</span>
        <span class="hidden xs:inline">Vị trí của tôi</span>
        <span class="xs:hidden">Vị trí</span>
      </button>
      <div class="w-px bg-white/10 mx-1"></div>
      <button id="btn-center-restaurants" class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 sm:gap-2 hover:bg-white/5 transition-all whitespace-nowrap">
        <span class="material-symbols-outlined text-sm">restaurant</span>
        <span class="hidden xs:inline">Danh sách quán</span>
        <span class="xs:hidden">Quán ăn</span>
      </button>
    </div>

    <!-- Bottom Drawer -->
    <section class="fixed bottom-0 left-0 w-full z-40 bg-[#181828]/70 backdrop-blur-xl rounded-t-[2rem] pt-5 sm:pt-6 pb-24 shadow-[0_-8px_24px_rgba(14,165,233,0.15)] border-t border-[#242437]/30">
      <div class="absolute top-2.5 sm:top-3 left-1/2 -translate-x-1/2 w-10 sm:w-12 h-1 sm:h-1.5 bg-outline rounded-full opacity-30"></div>
      <div class="px-4 sm:px-6 mb-3 sm:mb-4 flex justify-between items-center">
        <h2 class="font-headline font-extrabold text-base sm:text-lg flex items-center gap-2">
          <span class="text-lg sm:text-xl">🍜</span> Quán Ăn Lân Cận
        </h2>
        <button class="text-primary text-xs font-bold uppercase tracking-widest">Tất cả</button>
      </div>
      <!-- restaurant-cards: JS sẽ đổ dữ liệu vào đây -->
      <div class="restaurant-cards flex gap-3 sm:gap-4 overflow-x-auto px-4 sm:px-6 pb-3 sm:pb-4 no-scrollbar snap-x snap-mandatory scroll-smooth"></div>
    </section>

    <!-- QR FAB -->
    <button id="qr-scan-btn-fab" class="fixed right-4 sm:right-6 bottom-28 z-50 bg-gradient-to-r from-primary to-primary-fixed text-[#521f00] px-4 sm:px-5 h-12 sm:h-14 rounded-full flex items-center gap-2 sm:gap-3 shadow-[0_8px_24px_rgba(14,165,233,0.4)] active:scale-95 hover:shadow-[0_12px_28px_rgba(14,165,233,0.6)] transition-all font-bold">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">qr_code_scanner</span>
      <span class="font-bold text-xs sm:text-sm">Quét QR</span>
    </button>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-4 sm:px-6 pb-4 bg-[#181828]/70 backdrop-blur-xl rounded-t-[2rem] z-50 border-t border-[#242437]/30 shadow-[0_-8px_24px_rgba(14,165,233,0.15)]">
      <a class="flex flex-col items-center justify-center text-[#0ea5e9] py-1 min-w-0" href="map.html">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">map</span>
        <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-widest mt-0.5">Bản Đồ</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center justify-center text-[#e9e6f9]/50 hover:text-[#0ea5e9] transition-colors py-1 min-w-0">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-widest mt-0.5">Cá Nhân</span>
      </a>
    </nav>

    <script type="module" src="../js/map.js"></script>
  </body>
</html>
