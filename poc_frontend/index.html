<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vinh Khanh Audio Guide</title>
    <!-- Leaflet CSS & JS from CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: #121212; color: #fff;}
        #map { height: 100%; width: 100%; }
        
        /* Floating Mini Player (Based on Stitch Design) */
        #player-card {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            opacity: 0; /* Hidden by default */
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 1000;
        }

        #player-card.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .stall-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stall-name {
            font-size: 16px;
            font-weight: 700;
            color: #f26c0d;
        }

        .status-text {
            font-size: 12px;
            color: #aaa;
        }

        .play-btn {
            background: #f26c0d;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(242, 108, 13, 0.4);
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }
        
        #toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 2000;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div id="map"></div>
    
    <div id="player-card">
        <div class="stall-info">
            <div class="stall-name" id="stall-title">Loading...</div>
            <div class="status-text" id="stall-status">Audio Streaming...</div>
        </div>
        <button class="play-btn" id="play-pause-btn">
            <!-- Pause Icon Native -->
            <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
    </div>

    <!-- Main Application Script -->
    <script type="module" src="/app.js"></script>
</body>
</html>
