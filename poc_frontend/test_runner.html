<!DOCTYPE html>
<html>
<body>
    <h1>Testing Algorithms</h1>
    <pre id="output"></pre>
    <script type="module">
        import { isPointInPolygon, calculateHaversineDistance } from './algorithms.js';
        
        const out = document.getElementById('output');
        
        // Raycasting Tests
        const polygon = [
            { lat: 10, lon: 10 }, { lat: 10, lon: 20 },
            { lat: 0, lon: 20 }, { lat: 0, lon: 10 }
        ];
        
        const p1 = { lat: 5, lon: 15 }; // Inside
        const p2 = { lat: 25, lon: 25 }; // Outside
        const p3 = { lat: 0, lon: 15 }; // Edge case
        
        out.textContent += `--- Ray Casting Test ---\n`;
        out.textContent += `Point(5, 15) inside? Expected: true | Got: ${isPointInPolygon(p1, polygon)}\n`;
        out.textContent += `Point(25, 25) inside? Expected: false | Got: ${isPointInPolygon(p2, polygon)}\n\n`;

        // Haversine Tests
        out.textContent += `--- Haversine Math Test ---\n`;
        const dist = calculateHaversineDistance(10.7610, 106.7001, 10.7611, 106.7002);
        out.textContent += `Distance (Oc Oanh coordinates drift): ${dist.toFixed(5)} km (${(dist*1000).toFixed(2)} meters)\n`;
    </script>
</body>
</html>
